services:
  reportx-dev-ocarpentiero:
    build: .
    container_name: reportx-dev-ocarpentiero
    restart: unless-stopped
    volumes:
      - .:/usr/share/nginx/html:ro
    ports:
      # http://ReportX.unimore.it:8096 → nginx
      - "8096:8080"
    networks:
      - internal

networks:
  internal:
